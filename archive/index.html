<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Paper Daily - 归档</title>
    <link rel="stylesheet" href="../tailwind.css">
    <link rel="stylesheet" href="./assets/archive.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body data-archive-entry data-date-index="../date/config.json" class="min-h-screen bg-gradient-to-br from-slate-50 via-indigo-50/30 to-slate-100">
    <header class="glass sticky top-0 z-50 border-b border-slate-200/60">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6">
            <div>
                <h1 class="text-lg font-extrabold tracking-tight text-slate-900">归档</h1>
                <p class="text-xs text-slate-500">按月或按周聚合已有日报中的 3D 重点论文</p>
            </div>
            <nav class="flex items-center gap-4 text-sm font-semibold">
                <a href="../date/" class="text-slate-500 hover:text-indigo-700">每日论文</a>
                <a href="../" class="text-indigo-600 hover:text-indigo-800">首页</a>
            </nav>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6">
        <section class="mb-8 grid gap-4 md:grid-cols-2">
            <a href="./month/" class="archive-entry-card block rounded-2xl border border-slate-200 bg-white p-6 shadow-sm hover:border-indigo-300">
                <p class="text-xs font-bold uppercase tracking-wide text-slate-400">Month</p>
                <h2 class="mt-2 text-2xl font-black text-slate-950">月度归档</h2>
                <p class="mt-2 text-sm leading-6 text-slate-500">按月份汇总已有日报中的 3D 重点论文。</p>
            </a>
            <a href="./week/" class="archive-entry-card block rounded-2xl border border-slate-200 bg-white p-6 shadow-sm hover:border-indigo-300">
                <p class="text-xs font-bold uppercase tracking-wide text-slate-400">Week</p>
                <h2 class="mt-2 text-2xl font-black text-slate-950">周度归档</h2>
                <p class="mt-2 text-sm leading-6 text-slate-500">按 ISO 周汇总已有日报中的 3D 重点论文。</p>
            </a>
        </section>

        <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
                <div>
                    <p class="text-xs font-bold uppercase tracking-wide text-slate-400">可选月份</p>
                    <p id="archive-entry-status" class="mt-1 text-sm text-slate-500">正在加载日期索引</p>
                </div>
                <a id="latest-month-link" href="./month/" class="rounded-full bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700">最新月份</a>
            </div>
            <div id="archive-entry-months" class="flex flex-wrap gap-2"></div>
        </section>

        <section class="mt-6 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
            <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
                <div>
                    <p class="text-xs font-bold uppercase tracking-wide text-slate-400">可选周</p>
                    <p class="mt-1 text-sm text-slate-500">周编号使用 ISO week，例如 2026-W27。</p>
                </div>
                <a id="latest-week-link" href="./week/" class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">最新周</a>
            </div>
            <div id="archive-entry-weeks" class="flex flex-wrap gap-2"></div>
        </section>
    </main>

    <script src="./assets/archive.js"></script>
</body>
</html>
