<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Paper Daily - 周度归档</title>
    <link rel="stylesheet" href="../../tailwind.css">
    <link rel="stylesheet" href="../assets/archive.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body data-archive-mode="week" data-date-index="../../date/config.json" data-date-base="../../date/" class="min-h-screen bg-gradient-to-br from-slate-50 via-indigo-50/30 to-slate-100">
    <header class="glass sticky top-0 z-50 border-b border-slate-200/60">
        <div class="archive-topbar mx-auto max-w-6xl px-4 py-4 sm:px-6">
            <div class="archive-brand">
                <div class="archive-brand-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-6h6v6M4 21h16M5 3h14a2 2 0 012 2v14H3V5a2 2 0 012-2z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-tight text-slate-900">周度归档</h1>
                    <p id="archive-subtitle" class="text-xs text-slate-500"></p>
                </div>
            </div>
            <nav class="archive-nav">
                <a href="../">归档入口</a>
                <a href="../../date/">每日论文</a>
                <a href="../month/">月度归档</a>
                <a href="../../" class="is-strong">首页</a>
            </nav>
        </div>
    </header>

    <main class="archive-shell">
        <section class="archive-hero">
            <div class="archive-hero-head">
                <div>
                    <p class="archive-kicker">当前范围</p>
                    <p id="range-label" class="archive-title">加载中</p>
                    <p class="archive-description">按 ISO 周聚合已有日报中的 3D 重点论文，保留原始日报链接、arXiv 链接、关键词和图示。</p>
                </div>
                <a href="../month/" class="archive-mode-link">查看月度</a>
            </div>
            <div class="archive-period-panel">
                <div id="period-buttons"></div>
            </div>
        </section>

        <section id="loading" class="archive-loading">
            <div class="mb-3 flex items-center justify-between text-sm font-semibold text-slate-500">
                <span id="progress-text">正在加载</span>
            </div>
            <div class="archive-progress-track">
                <div id="progress-bar"></div>
            </div>
        </section>

        <section id="stats"></section>

        <section id="empty" class="archive-empty hidden">
            当前周暂无 3D 重点论文
        </section>

        <section id="error" class="archive-error hidden">
            <span id="error-text"></span>
        </section>

        <section id="paper-list"></section>
    </main>

    <script src="../assets/archive.js"></script>
</body>
</html>
